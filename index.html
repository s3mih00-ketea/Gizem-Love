<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gizem ❤️</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg1: #ffd6e7;
      --bg2: #ffeef6;
      --yes: #ff3b7a;
      --yesHover: #ff1f68;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
      padding: env(safe-area-inset);
    }

    #confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 24px 18px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }

    h1 {
      font-size: 24px;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .button-zone {
      position: relative;
      width: 100%;
      height: 140px;
    }

    button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 16px 22px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      min-width: 110px;
      touch-action: manipulation;
    }

    #yesBtn {
      left: 10%;
      background: var(--yes);
      color: white;
    }

    #noBtn {
      right: 10%;
      background: #e5e7eb;
    }

    .hint {
      font-size: 12px;
      margin-top: 10px;
      opacity: .7;
    }

    .result {
      display: none;
      margin-top: 20px;
      animation: fadeIn .4s ease;
    }

    .result h2 {
      font-size: 28px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>
  <canvas id="confettiCanvas"></canvas>

  <div class="card">
    <h1>Gizem benim kız arkadaşım olur musun? ❤️</h1>

    <div class="button-zone" id="zone">
      <button id="yesBtn">Evet</button>
      <button id="noBtn">Hayır</button>
    </div>

    <div class="hint" id="hint">“Hayır” kaçıyor 😏</div>

    <div class="result" id="result">
      <h2>YAŞASIN! 🎉</h2>
    </div>
  </div>

  <script>
    const zone = document.getElementById("zone");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const hint = document.getElementById("hint");

    const canvas = document.getElementById("confettiCanvas");

    const confettiInstance = confetti.create(canvas, {
      resize: true,
      useWorker: true
    });

    function fireConfetti() {
      confettiInstance({
        particleCount: 250,
        spread: 120
      });
    }

    let scale = 1;

    function growYes() {
      scale += 0.08;
      yesBtn.style.transform = `translateY(-50%) scale(${scale})`;
    }

    function moveNo() {
      const maxX = zone.clientWidth - noBtn.offsetWidth;
      const maxY = zone.clientHeight - noBtn.offsetHeight;

      const randX = Math.random() * maxX;
      const randY = Math.random() * maxY;

      noBtn.style.left = randX + "px";
      noBtn.style.top = randY + "px";
      noBtn.style.transform = "none";

      growYes();
    }

    zone.addEventListener("touchstart", moveNo);
    zone.addEventListener("mousemove", moveNo);

    noBtn.addEventListener("click", e => e.preventDefault());

    yesBtn.addEventListener("click", () => {
      zone.style.display = "none";
      hint.style.display = "none";
      result.style.display = "block";
      fireConfetti();
    });
  </script>
</body>
</html>
